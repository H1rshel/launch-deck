        /* Add a subtle border to define the window */
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      /* Bottom footer with loading text */
      .loading-footer {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 0 0 14px 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        background: linear-gradient(
          to top,
          rgba(5, 5, 10, 0.85) 0%,
          transparent 100%
        );
      }

      .progress-text {
        color: rgba(255, 255, 255, 0.45);
        font-size: 10px;
        font-weight: 500;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        animation: pulse-text 2.5s ease-in-out infinite;
      }

      @keyframes pulse-text {
        0%,
        100% {
          opacity: 0.5;
        }
        50% {
          opacity: 0.9;
        }
      }

      .progress-track {
        width: 100%;
        height: 2px;
        background: rgba(255, 255, 255, 0.06);
        overflow: hidden;
        position: relative;
      }

      .progress-fill {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 35%;
        background: linear-gradient(
          90deg,
          transparent,
          #00d4ff 40%,
          #7b2ff7 70%,
          transparent
        );
        animation: progress-slide 1.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        filter: blur(0.5px);
      }

      @keyframes progress-slide {
        0% {
          left: -40%;
        }
        100% {
          left: 110%;
        }
      }
    </style>
  </head>
  <body>
    <div class="splash-container" data-tauri-drag-region>
      <div class="loading-footer">
        <div class="progress-text">Initializing Systems</div>
        <div class="progress-track">
          <div class="progress-fill"></div>
        </div>
      </div>
    </div>
    <script>
      window.addEventListener('mousedown', (e) => {
        if (e.button === 0) {
          window.__TAURI_INTERNALS__?.invoke('plugin:window|start_dragging');
        }
      });
    </script>
  </body>
