name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        platform: [windows-2022]

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis -y --no-progress

      - name: Validate updater signing key
        shell: pwsh
        env:
          UPDATER_SIGNING_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY || secrets.TAURI_PRIVATE_KEY }}
          UPDATER_SIGNING_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || secrets.TAURI_PRIVATE_KEY_PASSWORD }}
        run: |
          $key = $env:UPDATER_SIGNING_KEY
          if ([string]::IsNullOrWhiteSpace($key)) {
            Write-Error "Missing updater signing key. Add a repository secret named TAURI_SIGNING_PRIVATE_KEY, or TAURI_PRIVATE_KEY for backwards compatibility."
          }

          function Get-KeyCandidate([string]$value) {
            $candidate = $value.Trim()
            if ($candidate -match "Private Key:\s*(?<key>[A-Za-z0-9+/=\s]+)") {
              $candidate = $Matches.key.Trim()
            }
            return $candidate
          }

          function Add-Base64Padding([string]$value) {
            $clean = ($value -replace "\s", "").Trim()
            switch ($clean.Length % 4) {
              2 { $clean = "$clean==" }
              3 { $clean = "$clean=" }
            }
            return $clean
          }

          function Decode-Base64Text([string]$value) {
            $normalized = Add-Base64Padding $value
            return [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String($normalized))
          }

          function Test-DecodedKeyText([string]$value) {
            return $value -match "untrusted comment:" -and $value -match "secret key"
          }

          function Test-KeyFileText([string]$value) {
            try {
              $decoded = Decode-Base64Text $value
              return Test-DecodedKeyText $decoded
            } catch {
              return $false
            }
          }

          $candidate = Get-KeyCandidate $key
          $keyFileText = $null

          if (Test-KeyFileText $candidate) {
            $keyFileText = Add-Base64Padding $candidate
          } elseif (Test-DecodedKeyText $candidate) {
            $keyFileText = [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes($candidate))
          } else {
            try {
              $decodedOnce = Decode-Base64Text $candidate
              if (Test-KeyFileText $decodedOnce) {
                $keyFileText = Add-Base64Padding $decodedOnce
              } elseif (Test-DecodedKeyText $decodedOnce) {
                $keyFileText = [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes($decodedOnce))
              }
            } catch {
              Write-Error "Invalid updater signing key. Re-create TAURI_SIGNING_PRIVATE_KEY from the generated private key, including any trailing '=' padding characters."
            }
          }

          if ([string]::IsNullOrWhiteSpace($keyFileText) -or -not (Test-KeyFileText $keyFileText)) {
            Write-Error "Invalid updater signing key. Re-create TAURI_SIGNING_PRIVATE_KEY from the generated private key, including any trailing '=' padding characters."
          }

          $keyPath = (Join-Path $env:RUNNER_TEMP "launch-deck-updater.key").Replace("\", "/")
          [IO.File]::WriteAllText($keyPath, $keyFileText, [Text.UTF8Encoding]::new($false))
          "TAURI_SIGNING_PRIVATE_KEY=$keyPath" >> $env:GITHUB_ENV
          "TAURI_PRIVATE_KEY=$keyPath" >> $env:GITHUB_ENV
          "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=$($env:UPDATER_SIGNING_KEY_PASSWORD)" >> $env:GITHUB_ENV
          "TAURI_PRIVATE_KEY_PASSWORD=$($env:UPDATER_SIGNING_KEY_PASSWORD)" >> $env:GITHUB_ENV

      - name: Build and Publish Tauri App
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IGDB_CLIENT_ID: ${{ secrets.IGDB_CLIENT_ID }}
          IGDB_CLIENT_SECRET: ${{ secrets.IGDB_CLIENT_SECRET }}
          ITAD_API_KEY: ${{ secrets.ITAD_API_KEY }}
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
          VITE_GAMES_DB_API_KEY: ${{ secrets.VITE_GAMES_DB_API_KEY }}
          VITE_RAWG_API_KEY: ${{ secrets.VITE_RAWG_API_KEY }}
          VITE_SGD_API_KEY: ${{ secrets.VITE_SGD_API_KEY }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        with:
          tauriScript: npm run tauri
          tagName: ${{ github.ref_name }}
          releaseName: "Launch Deck ${{ github.ref_name }}"
          releaseBody: "See the assets below to download this version and install."
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: false
          updaterJsonPreferNsis: true
          retryAttempts: 2
          args: --ci --bundles nsis

      - name: Publish compatible updater manifest
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"
          $headers = @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
            "User-Agent" = "launch-deck-release"
          }
          $repo = "${{ github.repository }}"
          $tag = "${{ github.ref_name }}"
          $release = Invoke-RestMethod -Headers $headers -Uri "https://api.github.com/repos/$repo/releases/tags/$tag"

          $setupAsset = $release.assets |
            Where-Object { $_.name -like "*setup.exe" } |
            Sort-Object created_at -Descending |
            Select-Object -First 1
          if (-not $setupAsset) {
            Write-Error "Could not find the uploaded NSIS setup asset on release $tag."
          }

          $sigPath = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis" -Filter "*setup.exe.sig" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $sigPath) {
            Write-Error "Could not find the generated updater signature."
          }

          $manifest = [ordered]@{
            version = $tag.TrimStart("v")
            notes = "See the assets below to download this version and install."
            pub_date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            url = $setupAsset.browser_download_url
            signature = (Get-Content -Raw -LiteralPath $sigPath.FullName).Trim()
          }

          $manifestPath = Join-Path $env:RUNNER_TEMP "latest.json"
          $manifest | ConvertTo-Json -Depth 5 | Set-Content -LiteralPath $manifestPath -Encoding utf8NoBOM

          $existingManifest = $release.assets | Where-Object { $_.name -eq "latest.json" } | Select-Object -First 1
          if ($existingManifest) {
            Invoke-RestMethod -Method Delete -Headers $headers -Uri $existingManifest.url | Out-Null
          }

          $uploadHeaders = @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
            "Content-Type" = "application/json"
            "User-Agent" = "launch-deck-release"
          }
          $uploadUrl = "https://uploads.github.com/repos/$repo/releases/$($release.id)/assets?name=latest.json"
          Invoke-RestMethod -Method Post -Headers $uploadHeaders -Uri $uploadUrl -InFile $manifestPath | Out-Null
